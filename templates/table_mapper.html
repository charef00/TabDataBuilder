<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dataset Builder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.panel{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.table-zone{
    max-height:700px;
    overflow:auto;
}

#ocrTable td{
    cursor:pointer;
}

.selected{
    background:#0d6efd !important;
    color:white;
}

.dataset-cell{
    min-width:120px;
}

</style>

</head>

<body>

<div class="container-fluid mt-3">

<div class="row">

<!-- OCR TABLE -->

<div class="col-lg-6">

<div class="panel">

<div class="d-flex justify-content-between mb-3">

<a href="/mapper-prev"
class="btn btn-secondary">
Previous
</a>

<h5>
{{ file_name }}
</h5>

<a href="/mapper-next"
class="btn btn-primary">
Next
</a>

</div>

<div class="table-zone">

<table
class="table table-bordered"
id="ocrTable">

{% for row in table_data %}

{% set row_index = loop.index0 %}

<tr>

{% for cell in row %}

<td
data-row="{{ row_index }}"
data-col="{{ loop.index0 }}"
onclick="selectCell(this)"
>

{{ cell }}

</td>

{% endfor %}

</tr>

{% endfor %}

</table>

</div>

</div>

</div>


<!-- FINAL DATASET -->

<div class="col-lg-6">

<div class="panel">

<h4>
Final Dataset
</h4>

<div class="row mb-3">

<div class="col">

<input
type="text"
id="columnName"
class="form-control"
placeholder="Column Name">

</div>

<div class="col-auto">

<button
class="btn btn-success"
onclick="addColumn()">

Add Column

</button>

</div>

</div>


<div class="row mb-3">

<div class="col">

<select
id="targetColumn"
class="form-select">
</select>

</div>

</div>


<div class="table-zone">

<table
class="table table-bordered"
id="finalTable">

<thead>

<tr id="headerRow">
</tr>

</thead>

<tbody id="datasetBody">
</tbody>

</table>

</div>


<div class="mt-3">


<button
class="btn btn-warning"
onclick="saveDataset()">

Save Dataset

</button>

<button
class="btn btn-success"
onclick="exportDataset()">

Export Excel

</button>

</div>

</div>

</div>

</div>

</div>
<script>

let selectedValues = [];

let columns = [];


// =====================================
// OCR CELL SELECTION
// =====================================

function selectCell(cell){

    let value =
        cell.innerText.trim();

    cell.classList.toggle(
        "selected"
    );

    if(
        selectedValues.includes(
            value
        )
    ){

        selectedValues =
        selectedValues.filter(
            v => v !== value
        );

    }else{

        selectedValues.push(
            value
        );
    }

    addSelectedToDataset();
}


// =====================================
// ADD COLUMN
// =====================================

function addColumn(){

    let name =
        document
        .getElementById(
            "columnName"
        )
        .value
        .trim();

    if(!name)
        return;

    columns.push({
        label:name,
        values:[]
    });

    document
    .getElementById(
        "columnName"
    )
    .value = "";

    renderDataset();

    saveDataset();
}


// =====================================
// RENDER DATASET
// =====================================

function renderDataset(){

    let body =
        document.getElementById(
            "datasetBody"
        );
    let currentSelection =
    document.getElementById(
        "targetColumn"
    ).value;

    let select =
        document.getElementById(
            "targetColumn"
        );

    body.innerHTML = "";
    select.innerHTML = "";

    columns.forEach(
        (
            column,
            colIndex
        ) => {

        let selected = "";

        if(
            currentSelection ==
            colIndex
        ){
            selected = "selected";
        }

        select.innerHTML += `
        <option
        value="${colIndex}"
        ${selected}>

            ${column.label}

        </option>
        `;

        let html = `
        <div class="card mb-3">

            <div
            class="card-header d-flex justify-content-between align-items-center">

                <strong>
                    ${column.label}
                </strong>
                <span
                class="
                badge
                bg-primary
                ms-2
                ">

                ${column.values.length}

                </span>

                <div>

                    <button
                    class="btn btn-warning btn-sm"
                    onclick="
                    renameColumn(
                        ${colIndex}
                    )
                    ">
                        Rename
                    </button>

                    <button
                    class="btn btn-danger btn-sm"
                    onclick="
                    deleteColumn(
                        ${colIndex}
                    )
                    ">
                        Delete
                    </button>

                </div>

            </div>

            <div class="card-body">
        `;

        column.values.forEach(
            (
                value,
                valueIndex
            ) => {

            html += `
            <div
            class="d-flex mb-2">

                <input
                type="text"
                class="form-control"

                value="${value}"

                onchange="
                updateValue(
                    ${colIndex},
                    ${valueIndex},
                    this.value
                )
                ">

                <button
                class="btn btn-danger ms-2"

                onclick="
                deleteValue(
                    ${colIndex},
                    ${valueIndex}
                )
                ">
                    X
                </button>

            </div>
            `;
        });

        html += `

            <button
            class="btn btn-success"

            onclick="
            addEmptyValue(
                ${colIndex}
            )
            ">
                Add Value
            </button>

            </div>

        </div>
        `;

        body.innerHTML += html;
    });
}


// =====================================
// ADD OCR VALUES
// =====================================

function addSelectedToDataset(){

    let target =
        parseInt(
            document
            .getElementById(
                "targetColumn"
            )
            .value
        );

    if(
        isNaN(target)
    )
        return;

    selectedValues.forEach(
        value => {

        columns[target]
        .values
        .push(value);
    });

    selectedValues = [];

    document
    .querySelectorAll(
        ".selected"
    )
    .forEach(
        e => {

        e.classList.remove(
            "selected"
        );
    });

    renderDataset();

    saveDataset();
}


// =====================================
// RENAME COLUMN
// =====================================

function renameColumn(
    colIndex
){

    let name =
        prompt(
            "Column name",
            columns[colIndex]
            .label
        );

    if(!name)
        return;

    columns[colIndex]
    .label = name;

    renderDataset();

    saveDataset();
}


// =====================================
// DELETE COLUMN
// =====================================

function deleteColumn(
    colIndex
){

    if(
        !confirm(
            "Delete column ?"
        )
    )
        return;

    columns.splice(
        colIndex,
        1
    );

    renderDataset();

    saveDataset();
}


// =====================================
// ADD EMPTY VALUE
// =====================================

function addEmptyValue(
    colIndex
){

    columns[colIndex]
    .values
    .push("");

    renderDataset();

    saveDataset();
}


// =====================================
// DELETE VALUE
// =====================================

function deleteValue(
    colIndex,
    valueIndex
){

    columns[colIndex]
    .values
    .splice(
        valueIndex,
        1
    );

    renderDataset();

    saveDataset();
}


// =====================================
// UPDATE VALUE
// =====================================

function updateValue(
    colIndex,
    valueIndex,
    value
){

    columns[colIndex]
    .values[
        valueIndex
    ] = value;

    saveDataset();
}


// =====================================
// SAVE
// =====================================

function saveDataset(){

    fetch(
        "/save-dataset",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:
            JSON.stringify(
                columns
            )
        }
    );
}


// =====================================
// LOAD
// =====================================

window.onload = function(){

    fetch(
        "/load-dataset"
    )

    .then(
        r => r.json()
    )

    .then(
        data => {

        if(
            Array.isArray(
                data
            )
        ){
            columns = data;
        }

        renderDataset();

    });
};


// =====================================
// EXPORT
// =====================================

function exportDataset(){

    window.location =
    "/export-dataset";
}
</script>

</body>
</html>
