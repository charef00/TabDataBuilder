<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .upload-card {
            border-radius: 20px;
            border: none;
        }

        .drop-zone {
            border: 3px dashed #0d6efd;
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            background: #f8fbff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone:hover {
            background: #eef5ff;
        }

        .drop-zone.dragover {
            background: #dbeafe;
            border-color: #084298;
        }

        .drop-zone i {
            font-size: 60px;
            color: #0d6efd;
        }

        .file-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .file-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow upload-card">
                <div class="card-body p-5">

                    <h2 class="text-center fw-bold mb-2">
                        Upload Your Files
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Drag & drop multiple files or click to browse
                    </p>

                    <form method="POST"
                          action="./upload"
                          enctype="multipart/form-data">

                        <!-- Drop Zone -->
                        <div class="drop-zone" id="dropZone">
                            <i class="bi bi-cloud-arrow-up"></i>
                            <h4 class="mt-3">
                                Drag & Drop Files Here
                            </h4>
                            <p class="text-muted">
                                or click to choose files
                            </p>

                            <input type="file"
                                   id="fileInput"
                                   name="files[]"
                                   multiple
                                   hidden>
                        </div>

                        <!-- File List -->
                        <div class="mt-4 file-list" id="fileList"></div>

                        <!-- Upload Button -->
                        <div class="d-grid mt-4">
                            <button type="submit"
                                class="btn btn-primary btn-lg rounded-pill">
                                <i class="bi bi-upload"></i>
                                Upload Files
                            </button>
                        </div>

                    </form>

                </div>
            </div>

            <!-- Clear All -->
            <div class="text-center mt-4">
                <button type="button"
                    class="btn btn-danger btn-lg rounded-pill"
                    onclick="clearAllFiles()">
                    <i class="bi bi-trash"></i>
                    Clear All Files
                </button>
            </div>

        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileList = document.getElementById("fileList");

    // Open file explorer on click
    dropZone.addEventListener("click", () => {
        fileInput.click();
    });

    // Drag over effect
    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });

    // Drop files
    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");

        fileInput.files = e.dataTransfer.files;
        displayFiles(fileInput.files);
    });

    // Select files manually
    fileInput.addEventListener("change", () => {
        displayFiles(fileInput.files);
    });

    // Display selected files
    function displayFiles(files) {
        fileList.innerHTML = "";

        Array.from(files).forEach(file => {
            const fileItem = document.createElement("div");
            fileItem.className = "file-item";

            fileItem.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${file.name}</strong><br>
                        <small class="text-muted">
                            ${(file.size / 1024).toFixed(2)} KB
                        </small>
                    </div>
                    <i class="bi bi-file-earmark fs-3 text-primary"></i>
                </div>
            `;

            fileList.appendChild(fileItem);
        });
    }

    // Clear all files
    function clearAllFiles() {
        if (!confirm("Are you sure you want to delete all files?")) {
            return;
        }

        fetch("/clear-all", {
            method: "POST"
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert("All files deleted successfully!");
                fileInput.value = "";
                fileList.innerHTML = "";
                location.reload();
            }
        })
        .catch(err => {
            alert("Error while deleting files");
            console.error(err);
        });
    }
</script>

</body>
</html>
